<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Venus bStock Defender</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg-deep: #070b24;
    --bg-mid: #0d1440;
    --bg-surface: rgba(13, 20, 64, 0.7);
    --venus-blue: #1a5cff;
    --venus-light: #4d8fff;
    --text: #e9ecf7;
    --text-dim: #8899bb;
    --danger: #ff4d5a;
    --danger-glow: rgba(255, 77, 90, 0.4);
    --success: #3dd68c;
    --success-glow: rgba(61, 214, 140, 0.3);
    --border: rgba(77, 143, 255, 0.15);
  }

  body {
    background: var(--bg-deep);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #game-wrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    max-width: 800px;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ─── HUD ─────────────────────────────── */
  #ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 10;
  }

  .hud-panel {
    background: rgba(7, 11, 36, 0.8);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 18px;
  }

  .hud-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 2px;
  }

  .hud-value {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }

  .hud-lives {
    display: flex;
    gap: 5px;
  }

  .hud-heart {
    font-size: 16px;
    transition: all 0.3s;
  }

  .hud-wave {
    color: var(--venus-light);
    font-weight: 700;
    font-size: 12px;
  }

  /* ─── OVERLAY SCREENS ──────────────────── */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    pointer-events: all;
    padding: 30px;
  }

  #start-screen {
    background: linear-gradient(180deg, rgba(7,11,36,0.6) 0%, rgba(7,11,36,0.92) 100%);
  }

  #gameover-screen {
    display: none;
    background: rgba(7, 11, 36, 0.94);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  /* ─── VENUS LOGO ───────────────────────── */
  .venus-logo-img {
    width: 64px;
    height: 64px;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 40px rgba(26, 92, 255, 0.6));
    animation: logoFloat 3s ease-in-out infinite;
    object-fit: contain;
  }

  @keyframes logoFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .title {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: -0.03em;
    background: linear-gradient(180deg, #ffffff 0%, #a8c8ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }

  .brand-line {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 32px;
  }

  .brand-dot {
    width: 5px;
    height: 5px;
    background: var(--venus-light);
    border-radius: 50%;
    opacity: 0.6;
  }

  .brand-text {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ─── TOKEN PILLS ──────────────────────── */
  .token-highlights {
    display: flex;
    gap: 10px;
    margin-bottom: 36px;
  }

  .token-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(26, 92, 255, 0.1);
    border: 1px solid rgba(77, 143, 255, 0.25);
    border-radius: 24px;
    padding: 8px 18px;
    transition: all 0.2s;
  }

  .token-badge .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .token-badge .dot.nvdab { background: #4da6ff; box-shadow: 0 0 8px rgba(77,166,255,0.8); }
  .token-badge .dot.spcxb { background: #a78bfa; box-shadow: 0 0 8px rgba(167,139,250,0.8); }
  .token-badge .dot.tslab { background: #34d399; box-shadow: 0 0 8px rgba(52,211,153,0.8); }

  .token-badge .name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  /* ─── RULES ────────────────────────────── */
  .rules {
    display: flex;
    gap: 24px;
    margin-bottom: 32px;
  }

  .rule {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
  }

  .rule-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .rule-icon.collect { background: rgba(61, 214, 140, 0.15); }
  .rule-icon.avoid { background: rgba(255, 77, 90, 0.15); }

  .rule .hl-green { color: var(--success); font-weight: 700; }
  .rule .hl-red { color: var(--danger); font-weight: 700; }

  /* ─── CONTROLS HINT ────────────────────── */
  .controls-hint {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
  }

  .key-badge {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.03em;
  }

  /* ─── BUTTONS ──────────────────────────── */
  .btn {
    pointer-events: all;
    background: linear-gradient(135deg, #1a5cff 0%, #4d8fff 100%);
    color: white;
    border: none;
    border-radius: 28px;
    padding: 14px 44px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 30px rgba(26, 92, 255, 0.35), 0 4px 16px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.1) 100%);
    pointer-events: none;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 44px rgba(26, 92, 255, 0.5), 0 6px 20px rgba(0,0,0,0.35);
  }

  .btn:active {
    transform: scale(0.96);
    box-shadow: 0 0 20px rgba(26, 92, 255, 0.3);
  }

  /* ─── GAMEOVER ─────────────────────────── */
  .final-score {
    font-size: 64px;
    font-weight: 900;
    letter-spacing: -0.03em;
    background: linear-gradient(180deg, #ffffff 0%, #8ab8ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 2px;
  }

  .final-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .collect-summary {
    display: flex;
    gap: 20px;
    margin-bottom: 28px;
  }

  .collect-stat {
    text-align: center;
    background: rgba(13, 20, 64, 0.5);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    min-width: 80px;
  }

  .collect-stat .stat-count {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .collect-stat .stat-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    margin-top: 3px;
  }

  /* ─── MOBILE CONTROLS ──────────────────── */
  .mobile-ctrls {
    position: absolute;
    bottom: 24px;
    left: 0; right: 0;
    display: none;
    justify-content: center;
    gap: 16px;
    z-index: 15;
    pointer-events: all;
  }

  .ctrl-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(26, 92, 255, 0.08);
    border: 1.5px solid rgba(77, 143, 255, 0.25);
    color: rgba(255, 255, 255, 0.8);
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.12s;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .ctrl-btn:active {
    background: rgba(26, 92, 255, 0.25);
    border-color: var(--venus-light);
    transform: scale(0.88);
    color: white;
  }

  @media (min-width: 769px) {
    .mobile-ctrls { display: none !important; }
  }

  @media (max-width: 768px) {
    .mobile-ctrls { display: flex; }
    .title { font-size: 32px; }
    .venus-logo-img { width: 52px; height: 52px; }
    .token-highlights { flex-wrap: wrap; justify-content: center; }
    .rules { flex-direction: column; gap: 12px; }
    .final-score { font-size: 48px; }
  }
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="game"></canvas>
  
  <!-- HUD -->
  <div id="ui-overlay">
    <div class="hud-panel">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="hud-score">0</div>
    </div>
    <div class="hud-panel" style="display:flex;flex-direction:column;align-items:center;">
      <div class="hud-label">Wave</div>
      <div class="hud-wave" id="hud-wave">1</div>
    </div>
    <div class="hud-panel">
      <div class="hud-lives" id="hud-lives">
        <span class="hud-heart">❤️</span>
        <span class="hud-heart">❤️</span>
        <span class="hud-heart">❤️</span>
      </div>
    </div>
  </div>

  <!-- Start Screen -->
  <div class="overlay" id="start-screen">
    <img class="venus-logo-img" src="venus-sign.png" alt="Venus Protocol">
    <div class="title">bStock Defender</div>
    <div class="brand-line">
      <span class="brand-dot"></span>
      <span class="brand-text">Venus Protocol</span>
      <span class="brand-dot"></span>
    </div>
    
    <div class="token-highlights">
      <div class="token-badge"><span class="dot nvdab"></span><span class="name">NVDAB</span></div>
      <div class="token-badge"><span class="dot spcxb"></span><span class="name">SPCXB</span></div>
      <div class="token-badge"><span class="dot tslab"></span><span class="name">TSLAB</span></div>
    </div>

    <div class="rules">
      <div class="rule">
        <div class="rule-icon collect">💎</div>
        Collect <span class="hl-green">bStock</span> tokens
      </div>
      <div class="rule">
        <div class="rule-icon avoid">⚠️</div>
        Avoid <span class="hl-red">deprecated</span> tokens
      </div>
    </div>

    <div class="controls-hint">
      <span class="key-badge">🖱 Mouse</span>
      <span class="key-badge">← → Keys</span>
      <span class="key-badge">📱 Touch</span>
    </div>

    <button class="btn" id="btn-start">LAUNCH 🚀</button>
  </div>

  <!-- Game Over Screen -->
  <div class="overlay" id="gameover-screen">
    <div class="final-score" id="final-score">0</div>
    <div class="final-label">Total Score</div>
    
    <div class="collect-summary">
      <div class="collect-stat">
        <div class="stat-count" id="count-nvdab">0</div>
        <div class="stat-label">NVDAB</div>
      </div>
      <div class="collect-stat">
        <div class="stat-count" id="count-spcxb">0</div>
        <div class="stat-label">SPCXB</div>
      </div>
      <div class="collect-stat">
        <div class="stat-count" id="count-tslab">0</div>
        <div class="stat-label">TSLAB</div>
      </div>
    </div>

    <button class="btn" id="btn-restart">PLAY AGAIN 🚀</button>
  </div>

  <!-- Mobile Controls -->
  <div class="mobile-ctrls" id="mobile-ctrls">
    <button class="ctrl-btn" id="btn-left">◀</button>
    <button class="ctrl-btn" id="btn-right">▶</button>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const startScreen = document.getElementById('start-screen');
  const gameoverScreen = document.getElementById('gameover-screen');
  const hudScore = document.getElementById('hud-score');
  const hudWave = document.getElementById('hud-wave');
  const hudLives = document.getElementById('hud-lives');

  // ─── GAME STATE ──────────────────────────
  let W, H;
  let state = 'start';
  let score = 0;
  let lives = 3;
  let wave = 1;
  let player = {};
  let collectibles = [];
  let obstacles = [];
  let particles = [];
  let stars = [];
  let frame = 0;
  let spawnTimer = 0;
  let collected = { NVDAB: 0, SPCXB: 0, TSLAB: 0 };
  
  // Input
  let keys = {};
  let mouseX = 0;
  let mouseOn = false;
  let touchX = null;
  let touchOn = false;
  let btnL = false, btnR = false;

  // ─── RESIZE ──────────────────────────────
  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    W = Math.min(rect.width, 800);
    H = Math.min(rect.height, window.innerHeight);
    canvas.width = W;
    canvas.height = H;
  }
  window.addEventListener('resize', resize);

  // ─── STARS ───────────────────────────────
  function initStars() {
    stars = [];
    for (let i = 0; i < 140; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.6 + 0.2,
        speed: Math.random() * 0.8 + 0.15,
        phase: Math.random() * Math.PI * 2,
        freq: 0.01 + Math.random() * 0.02
      });
    }
  }

  // ─── SHIP SPRITE ──────────────────────────
  const shipImg = new Image();
  shipImg.src = 'ship.png';

  // ─── TOKEN SPRITE LOADER ─────────────────
  const tokenImgs = {};
  
  function loadTokenSprite(sym) {
    const img = new Image();
    img.src = 'tokens/' + sym + '.png';
    tokenImgs[sym] = img;
  }
  
  // Load ALL token sprites from the official Venus asset pack
  // bStock (collectibles) use unused icons: XVS, VAI, DOT
  // Deprecated (obstacles) use their actual icons
  ['AAVE','ADA','BCH','BNB','BTCB','BUSD','CAKE','DAI','DOGE','DOT','ETH','FIL','LINK','LTC','XVS'].forEach(loadTokenSprite);

  // ─── PLAYER ──────────────────────────────
  function initPlayer() {
    player = {
      x: W / 2,
      y: H - 110,
      w: 48,
      h: 64,
      speed: 6.5,
      inv: 0,
      tilt: 0
    };
  }

  // ─── TOKEN DEFINITIONS ───────────────────
  const BSTOCK = ['NVDAB', 'SPCXB', 'TSLAB'];
  const BSTOCK_ICONS = { NVDAB: 'XVS', SPCXB: 'DOT', TSLAB: 'FIL' };
  const BSTOCK_BURST = { NVDAB: '#4da6ff', SPCXB: '#a78bfa', TSLAB: '#34d399' };
  const DEPRECATED = ['BCH','ADA','LTC','TWT','LINK','AAVE','DOGE','UNI','TRX','CAKE','XRP','FDUSD','SOL'];

  // ─── SPAWNERS ────────────────────────────
  function spawnCollectible() {
    const t = BSTOCK[Math.floor(Math.random() * 3)];
    collectibles.push({
      x: 30 + Math.random() * (W - 60),
      y: -36,
      token: t,
      icon: BSTOCK_ICONS[t],
      r: 16,
      speed: 1.4 + Math.random() * 1.6 + wave * 0.08,
      rot: 0,
      rotV: (Math.random() - 0.5) * 0.04,
      phase: Math.random() * Math.PI * 2
    });
  }

  function spawnObstacle() {
    const t = DEPRECATED[Math.floor(Math.random() * DEPRECATED.length)];
    const s = 22 + Math.random() * 14;
    obstacles.push({
      x: 30 + Math.random() * (W - 60),
      y: -36,
      token: t,
      r: s / 2,
      speed: 1.8 + Math.random() * 2.2 + wave * 0.2,
      wobbleP: Math.random() * Math.PI * 2,
      wobbleS: (Math.random() - 0.5) * 0.025,
      wobbleA: 16 + Math.random() * 24
    });
  }

  // ─── PARTICLES ───────────────────────────
  function burst(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = (Math.PI * 2 / count) * i + Math.random() * 0.3;
      const sp = 2 + Math.random() * 4;
      particles.push({
        x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 22 + Math.random() * 18, color, r: 1.5 + Math.random() * 3
      });
    }
  }

  // ─── HUD ─────────────────────────────────
  function syncHUD() {
    hudScore.textContent = score.toLocaleString();
    hudWave.textContent = wave;
    const hearts = [];
    for (let i = 0; i < 3; i++) hearts.push(i < lives ? '❤️' : '🖤');
    hudLives.innerHTML = hearts.map(h => `<span class="hud-heart">${h}</span>`).join('');
  }

  // ─── GAME LOGIC ──────────────────────────
  function update() {
    frame++;
    wave = 1 + Math.floor(score / 600);
    
    // Spawn
    spawnTimer++;
    const ci = Math.max(28, 72 - wave * 4);
    const oi = Math.max(34, 88 - wave * 5);
    if (spawnTimer % Math.floor(ci) === 0) spawnCollectible();
    if (spawnTimer % Math.floor(oi) === 0) spawnObstacle();
    
    // Player movement
    let tx = player.x;
    if (keys['ArrowLeft'] || keys['KeyA']) tx -= player.speed;
    if (keys['ArrowRight'] || keys['KeyD']) tx += player.speed;
    if (mouseOn) tx = mouseX;
    if (touchOn && touchX !== null) tx = touchX;
    if (btnL) tx -= player.speed;
    if (btnR) tx += player.speed;
    
    const px = player.x + (tx - player.x) * 0.28;
    player.tilt = Math.min(Math.max((tx - player.x) * 0.04, -0.35), 0.35);
    player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, px));
    if (player.inv > 0) player.inv--;
    
    // Stars
    for (let s of stars) {
      s.y += s.speed;
      s.phase += s.freq;
      if (s.y > H + 4) { s.y = -4; s.x = Math.random() * W; }
    }
    
    // Collectibles
    for (let i = collectibles.length - 1; i >= 0; i--) {
      const c = collectibles[i];
      c.y += c.speed;
      c.rot += c.rotV;
      c.phase += 0.04;
      if (c.y > H + 40) { collectibles.splice(i, 1); continue; }
      if (player.inv <= 0) {
        const dx = Math.abs(c.x - player.x);
        const dy = Math.abs(c.y - player.y);
        if (dx < (c.r + player.w/3) && dy < (c.r + player.h/3)) {
          score += 100;
          collected[c.token]++;
          burst(c.x, c.y, BSTOCK_BURST[c.token] || '#4da6ff', 14);
          collectibles.splice(i, 1);
        }
      }
    }
    
    // Obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.y += o.speed;
      o.wobbleP += o.wobbleS;
      o.x += Math.sin(o.wobbleP) * 0.5;
      if (o.y > H + 40) { obstacles.splice(i, 1); continue; }
      if (player.inv <= 0) {
        const dx = Math.abs(o.x - player.x);
        const dy = Math.abs(o.y - player.y);
        if (dx < (o.r + player.w/3) && dy < (o.r + player.h/3)) {
          lives--;
          player.inv = 100;
          burst(o.x, o.y, '#ff4d5a', 18);
          obstacles.splice(i, 1);
          syncHUD();
          if (lives <= 0) { endGame(); return; }
        }
      }
    }
    
    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  // ─── DRAW ────────────────────────────────
  function drawStars() {
    for (const s of stars) {
      const a = 0.4 + Math.sin(s.phase) * 0.35;
      ctx.fillStyle = `rgba(180,200,255,${Math.max(0.15, a)})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawPlayer() {
    const { x, y, w, h, inv, tilt } = player;
    if (inv > 0 && Math.floor(inv / 5) % 2 === 0) return;
    
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(tilt);
    
    // Draw ship sprite
    if (shipImg.complete && shipImg.naturalWidth > 0) {
      ctx.drawImage(shipImg, -w/2, -h/2, w, h);
    } else {
      // Fallback: simple ship shape if image not loaded
      ctx.fillStyle = '#f0f2f8';
      ctx.beginPath();
      ctx.moveTo(0, -h/2);
      ctx.lineTo(-w/3, h/3);
      ctx.lineTo(-w/6, h/2);
      ctx.lineTo(w/6, h/2);
      ctx.lineTo(w/3, h/3);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#4d8fff';
      ctx.beginPath();
      ctx.moveTo(0, -h/2 + 5);
      ctx.lineTo(-w/4 + 3, h/3 - 3);
      ctx.lineTo(0, h/5);
      ctx.lineTo(w/4 - 3, h/3 - 3);
      ctx.closePath();
      ctx.fill();
    }
    
    ctx.restore();
  }

  function drawCollectibles() {
    for (const c of collectibles) {
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.rot);
      
      const s = 1 + Math.sin(c.phase) * 0.06;
      ctx.scale(s, s);
      
      const img = tokenImgs[c.icon];
      if (img && img.complete && img.naturalWidth > 0) {
        // Draw official Venus token icon
        const sz = c.r * 2.2;
        ctx.drawImage(img, -sz/2, -sz/2, sz, sz);
      } else {
        // Fallback: simple colored circle
        ctx.fillStyle = '#1a5cff';
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#4da6ff';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(0, 0, c.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'white';
        ctx.font = `bold ${Math.max(7.5, c.r * 0.44)}px Inter, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(c.token, 0, 0.5);
      }
      
      ctx.restore();
    }
  }

  function drawObstacles() {
    for (const o of obstacles) {
      ctx.save();
      ctx.translate(o.x, o.y);
      
      // Danger aura
      const ag = ctx.createRadialGradient(0, 0, o.r * 0.3, 0, 0, o.r * 1.2);
      ag.addColorStop(0, 'rgba(255,77,90,0.2)');
      ag.addColorStop(1, 'rgba(255,77,90,0)');
      ctx.fillStyle = ag;
      ctx.beginPath();
      ctx.arc(0, 0, o.r * 1.2, 0, Math.PI * 2);
      ctx.fill();
      
      // Try sprite first
      const img = tokenImgs[o.token];
      if (img && img.complete && img.naturalWidth > 0) {
        const sz = o.r * 2.2;
        // Add red tint overlay for danger effect
        ctx.globalAlpha = 0.8;
        ctx.drawImage(img, -sz/2, -sz/2, sz, sz);
        ctx.globalAlpha = 1;
        // Red danger ring
        ctx.strokeStyle = '#ff4d5a';
        ctx.lineWidth = 2.5;
        ctx.shadowColor = 'rgba(255,77,90,0.6)';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(0, 0, o.r * 0.8, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;
      } else {
        // Fallback: diamond danger shape
        ctx.fillStyle = '#ff4d5a';
        ctx.shadowColor = 'rgba(255,77,90,0.5)';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.moveTo(0, -o.r);
        ctx.lineTo(o.r * 0.85, 0);
        ctx.lineTo(0, o.r);
        ctx.lineTo(-o.r * 0.85, 0);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(0,0,0,0.25)';
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.moveTo(-o.r * 0.35, -o.r * 0.35);
        ctx.lineTo(o.r * 0.35, o.r * 0.35);
        ctx.moveTo(o.r * 0.35, -o.r * 0.35);
        ctx.lineTo(-o.r * 0.35, o.r * 0.35);
        ctx.stroke();
        ctx.fillStyle = 'white';
        ctx.font = `bold ${Math.max(7, o.r * 0.5)}px Inter, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(o.token, 0, 0.5);
      }
      
      ctx.restore();
    }
  }

  function drawParticles() {
    for (const p of particles) {
      const a = Math.min(1, p.life / 20);
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawBackground() {
    // Deep space gradient
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#070b24');
    bg.addColorStop(0.5, '#0b1340');
    bg.addColorStop(1, '#0d1750');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);
    
    // Nebula clouds
    ctx.fillStyle = 'rgba(26, 92, 255, 0.025)';
    ctx.beginPath();
    ctx.ellipse(W * 0.75, H * 0.25, W * 0.55, H * 0.3, -0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(124, 58, 237, 0.018)';
    ctx.beginPath();
    ctx.ellipse(W * 0.2, H * 0.55, W * 0.45, H * 0.28, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(5, 150, 105, 0.015)';
    ctx.beginPath();
    ctx.ellipse(W * 0.5, H * 0.7, W * 0.4, H * 0.22, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function draw() {
    drawBackground();
    drawStars();
    drawCollectibles();
    drawObstacles();
    drawPlayer();
    drawParticles();
  }

  // ─── MAIN LOOP ───────────────────────────
  function loop() {
    if (state === 'playing') update();
    draw();
    syncHUD();
    requestAnimationFrame(loop);
  }

  // ─── START / END ─────────────────────────
  function startGame() {
    score = 0; lives = 3; wave = 1;
    collected = { NVDAB: 0, SPCXB: 0, TSLAB: 0 };
    collectibles = []; obstacles = []; particles = [];
    spawnTimer = 0; frame = 0;
    resize();
    initStars();
    initPlayer();
    state = 'playing';
    startScreen.style.display = 'none';
    gameoverScreen.style.display = 'none';
    syncHUD();
  }

  function endGame() {
    state = 'gameover';
    gameoverScreen.style.display = 'flex';
    document.getElementById('final-score').textContent = score.toLocaleString();
    document.getElementById('count-nvdab').textContent = collected.NVDAB;
    document.getElementById('count-spcxb').textContent = collected.SPCXB;
    document.getElementById('count-tslab').textContent = collected.TSLAB;
  }

  // ─── INPUT ───────────────────────────────
  document.addEventListener('keydown', e => { keys[e.code] = true; });
  document.addEventListener('keyup', e => { keys[e.code] = false; });
  
  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouseX = (e.clientX - r.left) * (W / r.width);
    mouseOn = true;
  });
  canvas.addEventListener('mouseleave', () => mouseOn = false);
  canvas.addEventListener('mouseenter', e => {
    mouseOn = true;
    const r = canvas.getBoundingClientRect();
    mouseX = (e.clientX - r.left) * (W / r.width);
  });
  
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    touchOn = true;
    const r = canvas.getBoundingClientRect();
    touchX = (e.touches[0].clientX - r.left) * (W / r.width);
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (touchOn) {
      const r = canvas.getBoundingClientRect();
      touchX = (e.touches[0].clientX - r.left) * (W / r.width);
    }
  }, { passive: false });
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    touchOn = false; touchX = null;
  }, { passive: false });

  // Mobile buttons
  const bl = document.getElementById('btn-left');
  const br = document.getElementById('btn-right');
  bl.addEventListener('pointerdown', e => { e.preventDefault(); btnL = true; });
  bl.addEventListener('pointerup', e => { e.preventDefault(); btnL = false; });
  bl.addEventListener('pointerleave', () => { btnL = false; });
  br.addEventListener('pointerdown', e => { e.preventDefault(); btnR = true; });
  br.addEventListener('pointerup', e => { e.preventDefault(); btnR = false; });
  br.addEventListener('pointerleave', () => { btnR = false; });

  // Buttons
  document.getElementById('btn-start').addEventListener('click', startGame);
  document.getElementById('btn-restart').addEventListener('click', startGame);

  // Keyboard start
  document.addEventListener('keydown', function startByKey(e) {
    if (state === 'start' && (e.code === 'Space' || e.code === 'Enter')) {
      startGame();
    }
    if (state === 'gameover' && (e.code === 'Space' || e.code === 'Enter')) {
      startGame();
    }
  });

  // ─── INIT ────────────────────────────────
  resize();
  initStars();
  initPlayer();
  loop();
})();
</script>
</body>
</html>
